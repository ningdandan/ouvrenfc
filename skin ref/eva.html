<html lang="ja" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">NERV Link Tree - Katakana Edition</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="6">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="7">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap" rel="stylesheet" vid="8">
    <style vid="9">
        :root {
            --term-green: #39ff14;
            --term-green-dim: #1d7a0a;
            --term-red: #FF8600;
            --term-orange: #FF8600;
            --term-bg: #050a05;
        }

        body {
            font-family: 'Share Tech Mono', 'Hiragino Sans', 'Meiryo', monospace;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--term-green);
            overflow: hidden;
        }

        #device-container {
            width: 375px;
            height: 812px;
            background-color: var(--term-bg);
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.1);
            border: 8px solid #1a1a1a;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.3) 50%,
                rgba(0, 0, 0, 0.3)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }

        .tv-static-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 60;
            overflow: hidden;
            /* Keep dark areas dark; noise reacts mostly on bright pixels */
            mix-blend-mode: color-dodge;
            opacity: 0.2;
        }

        .tv-static-burst {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 61;
            overflow: hidden;
            mix-blend-mode: difference;
            background: #ffffff;
            opacity: 0;
            transform-origin: center;
            animation: tv-psy-burst 3.8s steps(1, end) infinite;
        }

        .tv-static-burst::before {
            content: '';
            position: absolute;
            inset: -10%;
            background:
                repeating-linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0) 0px,
                    rgba(255, 255, 255, 0) 9px,
                    rgba(255, 255, 255, 0.95) 9px,
                    rgba(255, 255, 255, 0.95) 13px
                ),
                radial-gradient(rgba(255, 255, 255, 1) 0.75px, transparent 1px);
            background-size: auto, 2px 2px;
            animation: tv-psy-slice 3.8s steps(1, end) infinite;
            opacity: 0;
        }

        .tv-static-overlay::before,
        .tv-static-overlay::after {
            content: '';
            position: absolute;
            inset: -40%;
            pointer-events: none;
        }

        .tv-static-overlay::before {
            background-image:
                radial-gradient(rgba(255, 150, 150, 0.48) 0.7px, transparent 0.9px),
                radial-gradient(rgba(255, 70, 70, 0.38) 0.8px, transparent 1px),
                linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 140, 140, 0.1) 50%, rgba(255, 255, 255, 0) 100%);
            background-size: 3px 3px, 4px 4px, 100% 6px;
            background-position: 0 0, 1px 2px, 0 0;
            animation:
                tv-noise-shift 85ms steps(2, end) infinite,
                tv-flicker 95ms steps(2, end) infinite;
            opacity: 0.82;
        }

        .tv-static-overlay::after {
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.08) 0px,
                rgba(255, 255, 255, 0.08) 1px,
                rgba(0, 0, 0, 0) 1px,
                rgba(0, 0, 0, 0) 3px
            );
            animation:
                tv-glitch-jump 650ms steps(1, end) infinite,
                tv-flicker 110ms steps(2, end) infinite reverse;
            opacity: 0.42;
        }

        @keyframes tv-noise-shift {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1.5%, 1%); }
            40% { transform: translate(1.4%, -0.6%); }
            60% { transform: translate(-0.8%, -1.2%); }
            80% { transform: translate(1.7%, 0.8%); }
            100% { transform: translate(0, 0); }
        }

        @keyframes tv-flicker {
            0% { opacity: 0.08; }
            10% { opacity: 0.24; }
            19% { opacity: 0.1; }
            27% { opacity: 0.28; }
            36% { opacity: 0.09; }
            49% { opacity: 0.22; }
            62% { opacity: 0.1; }
            78% { opacity: 0.3; }
            100% { opacity: 0.09; }
        }

        @keyframes tv-glitch-jump {
            0%, 88% { transform: translate(0, 0) skewX(0deg); }
            89% { transform: translate(0.8%, -1.2%) skewX(1.2deg); }
            91% { transform: translate(-1.4%, 0.8%) skewX(-1.8deg); }
            93% { transform: translate(1.1%, -0.6%) skewX(0.9deg); }
            95% { transform: translate(-0.6%, 0.9%) skewX(-1deg); }
            100% { transform: translate(0, 0) skewX(0deg); }
        }

        @keyframes tv-psy-burst {
            0%, 82%, 100% {
                opacity: 0;
                transform: translate3d(0, 0, 0) skewX(0deg);
            }
            83% {
                opacity: 0.9;
                transform: translate3d(-1px, 0, 0) skewX(-1.6deg);
            }
            84% {
                opacity: 1;
                transform: translate3d(2px, -1px, 0) skewX(2.3deg);
            }
            85% {
                opacity: 0.82;
                transform: translate3d(-2px, 1px, 0) skewX(-2.6deg);
            }
            86%, 91% {
                opacity: 0;
                transform: translate3d(0, 0, 0) skewX(0deg);
            }
            92% {
                opacity: 0.72;
                transform: translate3d(1px, -1px, 0) skewX(1.4deg);
            }
            93% {
                opacity: 0;
                transform: translate3d(0, 0, 0) skewX(0deg);
            }
        }

        @keyframes tv-psy-slice {
            0%, 82%, 100% {
                opacity: 0;
                transform: translateY(0);
            }
            83% {
                opacity: 0.35;
                transform: translateY(-2%);
            }
            84% {
                opacity: 0.58;
                transform: translateY(1.5%);
            }
            85% {
                opacity: 0.28;
                transform: translateY(-1%);
            }
            86%, 91% {
                opacity: 0;
                transform: translateY(0);
            }
            92% {
                opacity: 0.4;
                transform: translateY(1%);
            }
            93% {
                opacity: 0;
                transform: translateY(0);
            }
        }

        .crt-glow {
            text-shadow: 0 0 2px var(--term-green), 0 0 8px rgba(57, 255, 20, 0.4);
        }

        .crt-glow-red {
            text-shadow: 0 0 2px var(--term-red), 0 0 8px rgba(255, 51, 51, 0.6);
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 120%);
            pointer-events: none;
            z-index: 40;
        }

        .map-grid {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(to right, rgba(0, 236, 159, 0.24) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 236, 159, 0.24) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(20deg) scale(1.1) translateY(-10%);
            transform-origin: top center;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(0, 236, 159, 0.7));
        }

        .map-contour {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.55;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(255, 102, 0, 0.35));
        }

        .map-contour path {
            fill: none;
            stroke: #ff8600;
            stroke-linecap: round;
        }

        .map-contour .contour-main {
            stroke-width: 1.6;
            stroke-opacity: 0.55;
        }

        .map-contour .contour-sub {
            stroke-width: 1;
            stroke-opacity: 0.34;
            stroke-dasharray: 5 7;
        }

        .map-contour .coord-mark {
            stroke: #ff9a3d;
            stroke-width: 1.2;
            stroke-opacity: 0.75;
            fill: none;
        }

        .map-contour .coord-dot {
            fill: #ff8600;
            fill-opacity: 0.7;
            animation: coord-blink 1.6s steps(2, end) infinite;
        }

        .map-contour .coord-label {
            fill: #ffad66;
            fill-opacity: 0.76;
            font-size: 7px;
            letter-spacing: 0.08em;
        }

        .map-contour .shockwave {
            stroke: #ff8600;
            stroke-width: 1.4;
            stroke-opacity: 0.58;
            fill: none;
            transform-box: fill-box;
            transform-origin: center;
            animation: wave-pulse 2.8s ease-out infinite;
        }

        .map-contour .shockwave-delayed {
            animation-delay: 1.2s;
        }

        .map-contour .shockwave-fast {
            animation-duration: 1.9s;
        }

        .map-contour .shockwave-slow {
            animation-duration: 3.6s;
        }

        .map-contour .shockwave-late {
            animation-delay: 0.7s;
        }

        .map-contour .blast-ring-static {
            stroke: #ffb06a;
            stroke-width: 1.1;
            stroke-opacity: 0.5;
            fill: none;
            stroke-dasharray: 3 6;
        }

        .map-contour .impact-spoke {
            stroke: #ff9a3d;
            stroke-width: 1.2;
            stroke-opacity: 0.6;
            fill: none;
        }

        @keyframes wave-pulse {
            0% {
                transform: scale(0.2);
                opacity: 0.75;
            }
            72% {
                opacity: 0.35;
            }
            100% {
                transform: scale(2.05);
                opacity: 0;
            }
        }

        @keyframes coord-blink {
            0%, 100% { opacity: 0.28; }
            50% { opacity: 1; }
        }

        .title-logo-wrap {
            position: absolute;
            top: -90px;
            left: 50%;
            width: 160px;
            height: 90px;
            transform: translateX(-50%);
            /* transform: translateY(-30%); */
            display: flex;
            /* align-items: center; */
            justify-content: center;
            pointer-events: none;
            z-index: -1;
            opacity: 0.92;
        }

        .title-logo-svg {
            width: 76%;
            height: 76%;
            overflow: visible;
            filter:
                drop-shadow(0 0 8px rgba(255, 134, 0, 0.95))
                drop-shadow(0 0 20px rgba(255, 80, 0, 0.6));
            transform-origin: center;
            animation:
                logo-spin 8s linear infinite,
                logo-core-pulse 1.2s ease-in-out infinite;
        }

        .map-logo-path {
            fill: none;
            stroke: #ff8600;
            stroke-width: 3.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes logo-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes logo-core-pulse {
            0%, 100% {
                filter:
                    drop-shadow(0 0 8px rgba(255, 134, 0, 0.8))
                    drop-shadow(0 0 20px rgba(255, 80, 0, 0.5));
            }
            50% {
                filter:
                    drop-shadow(0 0 12px rgba(255, 134, 0, 0.95))
                    drop-shadow(0 0 28px rgba(255, 80, 0, 0.65));
            }
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-fast {
            animation: pulse-fast 0.2s infinite;
        }

        .tactical-box {
            border: 1.5px solid var(--term-red);
            background-color: rgba(20, 0, 0, 0.8);
            position: relative;
        }
        .tactical-box::before {
            content: '';
            position: absolute;
            top: -1.5px; left: -1.5px;
            width: 6px; height: 6px;
            border-top: 1.5px solid white; border-left: 1.5px solid white;
        }
        .tactical-box::after {
            content: '';
            position: absolute;
            bottom: -1.5px; right: -1.5px;
            width: 6px; height: 6px;
            border-bottom: 1.5px solid white; border-right: 1.5px solid white;
        }

        .center-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--term-orange), transparent);
            transform: translateX(-50%);
            z-index: 3;
            box-shadow: 0 0 8px var(--term-orange);
            opacity: 0.8;
        }

        .map-text {
            position: absolute;
            font-size: 8px;
            color: var(--term-orange);
            opacity: 0.7;
            letter-spacing: 0.05em;
            pointer-events: none;
            z-index: 2;
            text-shadow: 0 0 8px rgba(195, 21, 0, 0.55);
        }

        .map-text-social {
            top: 130px;
            left: 60px;
        }

        .map-text-yokohama {
            top: 230px;
            left: 220px;
        }

        .hex-shape {
            --hex-clip: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .ops-title {
            font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
        }

        .ops-main-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.08em;
            line-height: 1;
            text-shadow: 0 0 10px #ffffff;
        }

        .ops-subtitle {
            font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
            font-size: 7px;
            color: #ffffff;
            letter-spacing: 0.25em;
            opacity: 0.8;
            text-align: right;
            margin-top: 4px;
        }

        .hex-link {
            position: relative;
            z-index: 12;
            overflow: visible;
            background-color: transparent;
            box-shadow: none;
            filter: none;
            isolation: isolate;
        }

        .hex-link::before {
            content: '';
            position: absolute;
            inset: 0;
            clip-path: var(--hex-clip);
            background-color: #ff8600;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.35);
            z-index: 0;
            pointer-events: none;
        }

        .hex-link::after {
            content: '';
            position: absolute;
            inset: -4px;
            clip-path: var(--hex-clip);
            background: rgba(195, 21, 0, 0.85);
            filter: blur(14px);
            opacity: 1;
            z-index: -1;
            pointer-events: none;
        }

        .hex-link:hover {
            box-shadow: none;
            filter: none;
        }

        .hex-link:hover::before {
            background-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.45), 0 0 22px rgba(195, 21, 0, 0.35);
        }

        .hex-link:hover::after {
            inset: -16px;
            background: rgba(195, 21, 0, 0.95);
            filter: blur(16px);
            opacity: 1;
        }

        .hex-label {
            color: #000000;
        }

        .hex-arrow-top {
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 12px solid #000000;
            margin-bottom: 6px;
            border-bottom-color: #000000;
        }

        .hex-arrow-bottom {
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 12px solid #000000;
            margin-top: 6px;
            border-top-color: #000000;
        }

        .hex-link:hover .hex-label {
            color: #ff8600;
        }

        .hex-link:hover .hex-arrow-top {
            border-bottom-color: #ff8600;
        }

        .hex-link:hover .hex-arrow-bottom {
            border-top-color: #ff8600;
        }

        .hex-nav-link {
            position: absolute;
            width: 110px;
            height: 96px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            animation: hex-spasm 3.1s steps(1, end) infinite;
            transform-origin: center;
            will-change: transform, filter;
        }

        .hex-nav-link > * {
            position: relative;
            z-index: 1;
        }

        .hex-link-label {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.08em;
        }

        .hex-pos-1 {
            top: 2%;
            left: 2%;
            animation-duration: 2.65s;
            animation-delay: -1.2s;
        }
        .hex-pos-2 {
            top: 30%;
            left: 20%;
            z-index: 10;
            animation-duration: 3.4s;
            animation-delay: -0.55s;
        }
        .hex-pos-3 {
            top: 58%;
            left: 2%;
            animation-duration: 2.95s;
            animation-delay: -2.1s;
        }
        .hex-pos-4 {
            top: 10%;
            right: 2%;
            animation-duration: 3.75s;
            animation-delay: -1.85s;
        }
        .hex-pos-5 {
            top: 40%;
            right: 16%;
            animation-duration: 2.5s;
            animation-delay: -0.9s;
        }
        .hex-pos-6 {
            top: 70%;
            right: 2%;
            animation-duration: 3.2s;
            animation-delay: -2.45s;
        }

        @keyframes hex-spasm {
            0%, 78%, 100% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                filter: none;
            }
            79% {
                transform: translate3d(-1px, 1px, 0) rotate(-0.9deg);
                filter: invert(1) contrast(1.3) saturate(1.5);
            }
            80% {
                transform: translate3d(2px, -1px, 0) rotate(0.8deg);
                filter: invert(1) contrast(1.4) saturate(1.6);
            }
            81% {
                transform: translate3d(-2px, 1px, 0) rotate(-0.6deg);
                filter: invert(1) contrast(1.25) saturate(1.35);
            }
            82% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                filter: none;
            }
            94% {
                transform: translate3d(1px, -1px, 0) rotate(0.5deg);
                filter: invert(1) contrast(1.2) saturate(1.25);
            }
            95% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                filter: none;
            }
        }

        .hazard-stripe {
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, #000, #000 10px, #ff6600 10px, #ff6600 20px);
        }

        .main-content {
            transform: translateY(10%);
        }
    </style>
</head>
